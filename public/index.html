<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANCHISE HQ — The Showers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b;--bg2:#0f0f12;--bg3:#141417;--bg4:#1c1c20;
  --accent:#2563eb;--accent2:#3b82f6;--accent3:rgba(37,99,235,.12);
  --tx:#a1a1aa;--txd:#52525b;--txb:#fafafa;
  --bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.11);
  --grn:#22c55e;--red:#ef4444;--yel:#eab308;--blu:#3b82f6;
  --grn-dim:rgba(34,197,94,.12);--red-dim:rgba(239,68,68,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
header{position:relative;z-index:10;background:var(--bg2);
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;flex-wrap:nowrap;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:28px;height:28px;background:var(--accent);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-weight:700;
  font-size:11px;color:#fff;letter-spacing:0;flex-shrink:0}
.brand-text{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:'Inter';font-weight:600;font-size:13px;letter-spacing:.01em;color:var(--txb)}
.brand-sub{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--txd);text-transform:uppercase}
.meta{display:flex;gap:0;align-items:center}
.mb{text-align:right;padding:0 20px;border-left:1px solid var(--bdr)}
.mb:first-child{border-left:none}
.mb .v{font-family:'JetBrains Mono';font-weight:600;font-size:15px;color:var(--txb);line-height:1}
.mb .l{font-size:9px;letter-spacing:.06em;color:var(--txd);text-transform:uppercase;margin-top:3px;font-weight:500}
.live{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:9px;
  letter-spacing:.1em;color:var(--grn);text-transform:uppercase;padding:0 20px;border-left:1px solid var(--bdr)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--grn);animation:pulse 2.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

/* Nav */
nav{position:relative;z-index:10;background:var(--bg2);border-bottom:1px solid var(--bdr);
  display:flex;overflow-x:auto;padding:0 20px}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;cursor:pointer;padding:0 14px;height:40px;
  font-family:'Inter';font-weight:500;font-size:12px;letter-spacing:.02em;
  color:var(--txd);position:relative;transition:color .15s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
nav button:hover{color:var(--tx)}
nav button.on{color:var(--txb);border-bottom-color:var(--accent2)}

/* Content */
main{position:relative;z-index:5;max-width:1400px;margin:0 auto;padding:20px 24px}
.tab{display:none}.tab.show{display:block}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;overflow:hidden;margin-bottom:12px;animation:fu .3s ease both}
.ch{padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between}
.ch h3{font-family:'Inter';font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx)}
.badge{font-family:'JetBrains Mono';font-size:10px;font-weight:500;
  padding:2px 8px;border-radius:3px;background:var(--accent3);color:var(--accent2);border:1px solid rgba(59,130,246,.15)}

/* Tables */
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-family:'Inter';font-weight:500;font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 12px;font-size:12px;font-weight:400;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap;color:var(--tx)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tc{text-align:center}.tr{text-align:right}
.mono{font-family:'JetBrains Mono';font-size:12px}

/* Team cell */
.tm{display:inline-flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;opacity:.9}
.ta{font-family:'JetBrains Mono';font-weight:600;font-size:12px;color:var(--txb)}
.tn{font-size:11px;color:var(--txd)}

/* OVR */
.ovr{font-family:'JetBrains Mono';font-weight:700;font-size:13px}
.oe{color:var(--yel)}.og{color:var(--grn)}.oa{color:var(--tx)}.ol{color:var(--red)}

/* Records */
.ph{color:var(--grn);font-weight:600;font-family:'JetBrains Mono'}
.pw{color:var(--yel);font-weight:600;font-family:'JetBrains Mono'}
.pc{color:var(--red);font-weight:600;font-family:'JetBrains Mono'}
.dp{color:var(--grn);font-weight:500}.dn{color:var(--red);font-weight:500}.dz{color:var(--txd)}
.rec{font-family:'JetBrains Mono';font-weight:600;font-size:13px;color:var(--txb)}

/* Dev traits */
.dx{color:#f87171;font-weight:600}.ds{color:#fbbf24;font-weight:600}.dt{color:#60a5fa;font-weight:600}.dn2{color:var(--txd)}

/* Position tag */
.pt{font-family:'JetBrains Mono';font-size:9px;font-weight:600;letter-spacing:.04em;
  padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--tx);border:1px solid var(--bdr)}

/* Conference label */
.conf{font-family:'Inter';font-weight:600;font-size:10px;letter-spacing:.1em;color:var(--accent2);
  text-transform:uppercase;padding:20px 0 8px;opacity:.8}
.conf:first-child{padding-top:0}

/* Scoreboard */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;padding:12px}
.gc{background:var(--bg2);border:1px solid var(--bdr);
  border-radius:4px;padding:12px 16px;position:relative;overflow:hidden;transition:border-color .2s}
.gc:hover{border-color:var(--bdr2)}
.gc .wl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--txd);text-transform:uppercase;margin-bottom:10px}
.gc .mu{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gc .ts{display:flex;align-items:center;gap:7px;min-width:0}
.gc .ab{font-family:'JetBrains Mono';font-weight:700;font-size:15px;color:var(--txb)}
.gc .sc{display:flex;align-items:center;gap:10px;padding:0 10px;flex-shrink:0}
.gc .sv{font-family:'JetBrains Mono';font-weight:700;font-size:22px;min-width:28px;text-align:center}
.gc .sw{color:var(--txb)}.gc .sl{color:var(--txd)}
.gc .sd{color:var(--txd);font-size:14px}
.gc .ft{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--grn);text-transform:uppercase;text-align:center;margin-top:10px;opacity:.6}
.gc .wb{position:absolute;bottom:0;left:0;right:0;height:1px;opacity:.4}

/* Filter bar */
.fb{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
select,input[type=text]{padding:7px 10px;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:4px;color:var(--tx);font-family:'Inter';font-size:12px;outline:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--bdr2)}
select option{background:var(--bg3)}
.fb select{min-width:130px}
.fb .ct{font-size:11px;color:var(--txd);margin-left:auto;font-family:'JetBrains Mono'}

/* Empty */
.empty{padding:40px 24px;text-align:center}
.empty h4{font-family:'Inter';font-size:13px;font-weight:500;color:var(--txd);margin-bottom:6px}
.empty p{font-size:11px;color:var(--txd);opacity:.5}

/* Export Log */
.elog td{font-family:'JetBrains Mono';font-size:11px}
.etype{padding:2px 7px;border-radius:3px;background:var(--accent3);color:var(--accent2);font-weight:500;font-size:10px;border:1px solid rgba(59,130,246,.15)}

/* Notif */
.notif{position:fixed;top:14px;right:14px;z-index:1000;padding:10px 20px;border-radius:4px;
  font-family:'Inter';font-weight:500;font-size:12px;letter-spacing:.01em;
  box-shadow:0 8px 32px rgba(0,0,0,.6);animation:si .3s cubic-bezier(.16,1,.3,1);display:none}
.notif.ok{background:var(--grn);color:#000}.notif.err{background:var(--red);color:#fff}

/* Section bar */
.sb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sb h2{font-family:'Inter';font-weight:600;font-size:16px;color:var(--txb)}

/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Setup */
.info-box{padding:18px;font-size:12px;line-height:1.9;color:var(--tx)}
.info-box h4{color:var(--txb);font-family:'Inter';font-weight:600;font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;margin:16px 0 6px}
.info-box h4:first-child{margin-top:0}
.info-box ol{padding-left:18px;margin:4px 0}
.info-box .hl{color:var(--accent2);font-weight:500}
.info-box code{background:var(--bg4);padding:2px 7px;border-radius:3px;font-size:11px;color:var(--txb);font-family:'JetBrains Mono';border:1px solid var(--bdr)}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* Standings layout */
.std-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.std-grid{grid-template-columns:1fr}}

@media(max-width:768px){
  header{padding:0 14px;height:48px}.brand-name{font-size:12px}
  .meta{gap:0}.mb{padding:0 12px}
  nav{padding:0 10px}nav button{padding:0 10px;font-size:11px}
  main{padding:12px 14px}.sg{grid-template-columns:1fr}
  td,th{padding:7px 8px;font-size:11px}
}
</style>
</head>
<body>
<div id="notif" class="notif"></div>

<header>
  <div class="brand">
    <div class="logo">FH</div>
    <div class="brand-text">
      <div class="brand-name">The Showers</div>
      <div class="brand-sub">Franchise Command Center</div>
    </div>
  </div>
  <div class="meta">
    <div class="live"><div class="live-dot"></div>Live</div>
    <div class="mb"><div class="v" id="mPlayers">—</div><div class="l">Players</div></div>
    <div class="mb"><div class="v" id="mExports">—</div><div class="l">Exports</div></div>
    <div class="mb"><div class="v" id="mLast">—</div><div class="l">Last Sync</div></div>
  </div>
</header>

<nav id="nav">
  <button class="on" onclick="go('standings',this)">Standings</button>
  <button onclick="go('scores',this)">Scores</button>
  <button onclick="go('roster',this)">Roster</button>
  <button onclick="go('passing',this)">Passing</button>
  <button onclick="go('rushing',this)">Rushing</button>
  <button onclick="go('receiving',this)">Receiving</button>
  <button onclick="go('defense',this)">Defense</button>
  <button onclick="go('teamstats',this)">Team Stats</button>
  <button onclick="go('setup',this)">Setup</button>
</nav>

<main>
  <div id="t-standings" class="tab show"></div>
  <div id="t-scores" class="tab"></div>
  <div id="t-roster" class="tab"></div>
  <div id="t-passing" class="tab"></div>
  <div id="t-rushing" class="tab"></div>
  <div id="t-receiving" class="tab"></div>
  <div id="t-defense" class="tab"></div>
  <div id="t-teamstats" class="tab"></div>
  <div id="t-setup" class="tab"></div>
</main>

<script>
// === DATA ===
const TI={ARI:{n:"Cardinals",c:"Arizona",cl:"#97233F"},ATL:{n:"Falcons",c:"Atlanta",cl:"#A71930"},
BAL:{n:"Ravens",c:"Baltimore",cl:"#241773"},BUF:{n:"Bills",c:"Buffalo",cl:"#00338D"},
CAR:{n:"Panthers",c:"Carolina",cl:"#0085CA"},CHI:{n:"Bears",c:"Chicago",cl:"#0B162A"},
CIN:{n:"Bengals",c:"Cincinnati",cl:"#FB4F14"},CLE:{n:"Browns",c:"Cleveland",cl:"#311D00"},
DAL:{n:"Cowboys",c:"Dallas",cl:"#003594"},DEN:{n:"Broncos",c:"Denver",cl:"#FB4F14"},
DET:{n:"Lions",c:"Detroit",cl:"#0076B6"},GB:{n:"Packers",c:"Green Bay",cl:"#203731"},
HOU:{n:"Texans",c:"Houston",cl:"#03202F"},IND:{n:"Colts",c:"Indianapolis",cl:"#002C5F"},
JAX:{n:"Jaguars",c:"Jacksonville",cl:"#006778"},KC:{n:"Chiefs",c:"Kansas City",cl:"#E31837"},
LV:{n:"Raiders",c:"Las Vegas",cl:"#6b7280"},LAC:{n:"Chargers",c:"Los Angeles",cl:"#0080C6"},
LAR:{n:"Rams",c:"Los Angeles",cl:"#003594"},MIA:{n:"Dolphins",c:"Miami",cl:"#008E97"},
MIN:{n:"Vikings",c:"Minnesota",cl:"#4F2683"},NE:{n:"Patriots",c:"New England",cl:"#002244"},
NO:{n:"Saints",c:"New Orleans",cl:"#D3BC8D"},NYG:{n:"Giants",c:"New York",cl:"#0B2265"},
NYJ:{n:"Jets",c:"New York",cl:"#125740"},PHI:{n:"Eagles",c:"Philadelphia",cl:"#004C54"},
PIT:{n:"Steelers",c:"Pittsburgh",cl:"#FFB612"},SF:{n:"49ers",c:"San Francisco",cl:"#AA0000"},
SEA:{n:"Seahawks",c:"Seattle",cl:"#002244"},TB:{n:"Buccaneers",c:"Tampa Bay",cl:"#D50A0A"},
TEN:{n:"Titans",c:"Tennessee",cl:"#0C2340"},WAS:{n:"Commanders",c:"Washington",cl:"#5A1414"},
AZ:{n:"Cardinals",c:"Arizona",cl:"#97233F"},
FA:{n:"Free Agent",c:"",cl:"#3f3f46"}};

const DIVS={"AFC East":["BUF","MIA","NE","NYJ"],"AFC North":["BAL","CIN","CLE","PIT"],
"AFC South":["HOU","IND","JAX","TEN"],"AFC West":["DEN","KC","LAC","LV"],
"NFC East":["DAL","NYG","PHI","WAS"],"NFC North":["CHI","DET","GB","MIN"],
"NFC South":["ATL","CAR","NO","TB"],"NFC West":["ARI","LAR","SEA","SF"]};

const DV={0:"Normal",1:"Star",2:"Superstar",3:"X-Factor"};
const DC={0:"dn2",1:"dt",2:"ds",3:"dx"};

function ti(a){return TI[a]||{n:a,c:"",cl:"#3f3f46"}}
function tc(a){const t=ti(a);return`<div class="tm"><div class="dot" style="background:${t.cl}"></div><span class="ta">${a}</span><span class="tn">${t.n}</span></div>`}
function ovc(v){return v>=90?'oe':v>=80?'og':v>=70?'oa':'ol'}
function pctc(p){return p>=.6?'ph':p>=.4?'pw':'pc'}

let curTab='standings';
function go(tab,btn){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('show'));
  document.getElementById('t-'+tab).classList.add('show');
  curTab=tab;
  load(tab);
}

// === API ===
async function api(url){
  try{const r=await fetch(url);return await r.json();}catch(e){console.error(e);return[];}
}

async function loadSummary(){
  const s=await api('/api/summary');
  document.getElementById('mPlayers').textContent=s.totalPlayers||'—';
  document.getElementById('mExports').textContent=s.totalExports||'—';
  if(s.lastExport){
    const d=new Date(s.lastExport+'Z');
    const ago=Math.round((Date.now()-d.getTime())/60000);
    document.getElementById('mLast').textContent=ago<60?ago+'m':Math.round(ago/60)+'h';
  }
}

async function load(tab){
  if(tab==='standings')await loadStandings();
  else if(tab==='scores')await loadScores();
  else if(tab==='roster')await loadRoster();
  else if(tab==='passing')await loadWeekly('passing');
  else if(tab==='rushing')await loadWeekly('rushing');
  else if(tab==='receiving')await loadWeekly('receiving');
  else if(tab==='defense')await loadWeekly('defense');
  else if(tab==='teamstats')await loadTeamStats();
  else if(tab==='setup')loadSetup();
}

// === STANDINGS ===
async function loadStandings(){
  const rows=await api('/api/standings');
  const el=document.getElementById('t-standings');
  if(!rows.length){el.innerHTML=`<div class="card"><div class="empty"><h4>No standings data</h4><p>Export league info from the Madden Companion App</p></div></div>`;return;}

  const byTeam={};rows.forEach(r=>byTeam[r.team_abbr]=r);
  const confs=[{n:"AFC",ds:["AFC East","AFC North","AFC South","AFC West"]},{n:"NFC",ds:["NFC East","NFC North","NFC South","NFC West"]}];
  let h='<div class="std-grid">';
  confs.forEach(conf=>{
    h+=`<div>`;
    h+=`<div class="conf">${conf.n}</div>`;
    conf.ds.forEach(div=>{
      const teams=DIVS[div].map(a=>({a,...(byTeam[a]||{wins:0,losses:0,ties:0,pts_for:0,pts_against:0})}))
        .sort((a,b)=>{const ap=(a.wins+a.losses+a.ties)>0?a.wins/(a.wins+a.losses+a.ties):0;
          const bp=(b.wins+b.losses+b.ties)>0?b.wins/(b.wins+b.losses+b.ties):0;return bp-ap||(b.pts_for||0)-(a.pts_for||0);});
      h+=`<div class="card"><div class="ch"><h3>${div}</h3></div><div style="overflow-x:auto"><table>
        <thead><tr><th>Team</th><th class="tc">W</th><th class="tc">L</th>
        <th class="tc">PCT</th><th class="tc">PF/G</th><th class="tc">PA/G</th><th class="tc">DIFF/G</th></tr></thead><tbody>`;
      teams.forEach((tm,i)=>{
        const t=ti(tm.a);const tot=tm.wins+tm.losses+tm.ties;
        const pct=tot>0?tm.wins/tot:0;const diff=(tm.pts_for||0)-(tm.pts_against||0);
        const ldr=i===0&&tot>0?'background:rgba(255,255,255,.015)':'';
        h+=`<tr style="${ldr}"><td>${tc(tm.a)}</td>
          <td class="tc rec">${tm.wins}</td>
          <td class="tc mono" style="color:var(--txd)">${tm.losses}</td>
          <td class="tc ${pctc(pct)}">${pct.toFixed(3)}</td>
          <td class="tc mono">${tm.pts_for||0}</td>
          <td class="tc mono" style="color:var(--txd)">${tm.pts_against||0}</td>
          <td class="tc ${diff>0?'dp':diff<0?'dn':'dz'} mono">${diff>0?'+':''}${diff}</td></tr>`;
      });
      h+=`</tbody></table></div></div>`;
    });
    h+=`</div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

// === SCORES ===
async function loadScores(){
  const rows=await api('/api/schedules');
  const el=document.getElementById('t-scores');
  if(!rows.length){el.innerHTML=`<div class="card"><div class="empty"><h4>No schedule data</h4><p>Export schedule data from the Companion App</p></div></div>`;return;}

  // A game is "played" if it has a score OR is marked complete
  const played=rows.filter(r=>r.is_complete||r.home_score>0||r.away_score>0);
  const upcoming=rows.filter(r=>!r.is_complete&&r.home_score===0&&r.away_score===0);

  let h=`<div class="sb"><h2>Scores</h2></div>`;

  if(played.length){
    const byWeek={};played.forEach(g=>{if(!byWeek[g.week])byWeek[g.week]=[];byWeek[g.week].push(g);});
    const weeks=Object.keys(byWeek).sort((a,b)=>b-a);
    weeks.forEach(wk=>{
      h+=`<div class="card"><div class="ch"><h3>Week ${wk}</h3><span class="badge">${byWeek[wk].length} games</span></div><div class="sg">`;
      byWeek[wk].forEach(g=>{
        const ht=ti(g.home_team),at=ti(g.away_team);
        const hw=g.home_score>g.away_score,aw=g.away_score>g.home_score;
        const bar=hw?ht.cl:at.cl;
        h+=`<div class="gc">
          <div class="wl">Week ${g.week} &middot; Final</div>
          <div class="mu">
            <div class="ts" style="opacity:${aw?1:.4}"><div class="dot" style="background:${at.cl}"></div><span class="ab">${g.away_team}</span></div>
            <div class="sc"><span class="sv ${aw?'sw':'sl'}">${g.away_score}</span><span class="sd">–</span><span class="sv ${hw?'sw':'sl'}">${g.home_score}</span></div>
            <div class="ts" style="opacity:${hw?1:.4};flex-direction:row-reverse"><div class="dot" style="background:${ht.cl}"></div><span class="ab">${g.home_team}</span></div>
          </div>
          <div class="wb" style="background:${bar}"></div>
        </div>`;
      });
      h+=`</div></div>`;
    });
  }

  if(upcoming.length){
    const byWeek={};upcoming.forEach(g=>{if(!byWeek[g.week])byWeek[g.week]=[];byWeek[g.week].push(g);});
    const weeks=Object.keys(byWeek).sort((a,b)=>a-b);
    weeks.forEach(wk=>{
      h+=`<div class="card"><div class="ch"><h3>Week ${wk} — Upcoming</h3><span class="badge">${byWeek[wk].length} matchups</span></div><div class="sg">`;
      byWeek[wk].forEach(g=>{
        const ht=ti(g.home_team),at=ti(g.away_team);
        h+=`<div class="gc">
          <div class="wl" style="color:var(--txd)">Week ${g.week} &middot; Upcoming</div>
          <div class="mu">
            <div class="ts"><div class="dot" style="background:${at.cl}"></div><span class="ab">${g.away_team}</span><span class="tn" style="display:none">${at.n}</span></div>
            <div class="sc"><span class="sv" style="color:var(--txd);font-size:14px">vs</span></div>
            <div class="ts" style="flex-direction:row-reverse"><div class="dot" style="background:${ht.cl}"></div><span class="ab">${g.home_team}</span></div>
          </div>
        </div>`;
      });
      h+=`</div></div>`;
    });
  }

  if(!played.length&&!upcoming.length){
    h+=`<div class="card"><div class="empty"><h4>No games yet</h4><p>Export schedule from the Companion App</p></div></div>`;
  }

  el.innerHTML=h;
}

// === ROSTER ===
let rTeam='ALL',rPos='ALL',rSort='overall';
async function loadRoster(){
  const params=new URLSearchParams({team:rTeam,position:rPos,sort:rSort,limit:'200'});
  const rows=await api('/api/rosters?'+params);
  const el=document.getElementById('t-roster');
  const positions=[...new Set(rows.map(r=>r.position))].filter(Boolean).sort();

  let h=`<div class="fb">
    <select onchange="rTeam=this.value;loadRoster()"><option value="ALL">All Teams</option>
    ${Object.keys(TI).sort().map(a=>`<option value="${a}" ${rTeam===a?'selected':''}>${ti(a).n}</option>`).join('')}</select>
    <select onchange="rPos=this.value;loadRoster()"><option value="ALL">All Positions</option>
    ${positions.map(p=>`<option value="${p}" ${rPos===p?'selected':''}>${p}</option>`).join('')}</select>
    <select onchange="rSort=this.value;loadRoster()">
    <option value="overall" ${rSort==='overall'?'selected':''}>OVR</option>
    <option value="age" ${rSort==='age'?'selected':''}>Age</option>
    <option value="speed_rating" ${rSort==='speed_rating'?'selected':''}>Speed</option>
    <option value="awareness_rating" ${rSort==='awareness_rating'?'selected':''}>Awareness</option>
    </select>
    <span class="ct">${rows.length} players</span></div>`;

  if(!rows.length){h+=`<div class="card"><div class="empty"><h4>No roster data</h4><p>Export rosters from the Companion App</p></div></div>`;el.innerHTML=h;return;}

  h+=`<div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>Player</th><th>Pos</th><th>Team</th><th class="tc">OVR</th><th class="tc">Age</th>
    <th class="tc">SPD</th><th class="tc">AWR</th><th>Dev</th><th class="tc">Yrs</th></tr></thead><tbody>`;
  rows.forEach(p=>{
    h+=`<tr><td style="color:var(--txb);font-weight:500">${p.first_name} ${p.last_name}${p.jersey_num?` <span style="color:var(--txd);font-size:10px;font-family:'JetBrains Mono'">#${p.jersey_num}</span>`:''}</td>
      <td><span class="pt">${p.position}</span></td>
      <td>${tc(p.team_abbr)}</td>
      <td class="tc"><span class="ovr ${ovc(p.overall)}">${p.overall}</span></td>
      <td class="tc mono">${p.age||'—'}</td>
      <td class="tc mono">${p.speed_rating||'—'}</td>
      <td class="tc mono">${p.awareness_rating||'—'}</td>
      <td><span class="${DC[p.dev_trait]||'dn2'}">${DV[p.dev_trait]||'Normal'}</span></td>
      <td class="tc mono">${p.years_pro||'R'}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  el.innerHTML=h;
}

// === WEEKLY STATS ===
async function loadWeekly(type){
  const rows=await api(`/api/stats/${type}?limit=100`);
  const el=document.getElementById('t-'+type);
  if(!rows.length){await loadRosterStats(type,el);return;}

  const cols={
    passing:{h:['Player','Team','Wk','Att','Cmp','Yds','TD','INT','Rating'],
      f:r=>`<td style="color:var(--txb);font-weight:500">${r.full_name||r.roster_id}</td><td>${tc(r.team_abbr)}</td>
        <td class="tc mono">${r.week}</td><td class="tc mono">${r.pass_att}</td><td class="tc mono">${r.pass_comp}</td>
        <td class="tc mono" style="color:var(--txb);font-weight:600">${r.pass_yds}</td>
        <td class="tc mono" style="color:var(--grn)">${r.pass_tds}</td>
        <td class="tc mono" style="color:var(--red)">${r.pass_ints}</td>
        <td class="tc mono">${(r.passer_rating||0).toFixed(1)}</td>`},
    rushing:{h:['Player','Team','Wk','Att','Yds','TD','Fum','Lng'],
      f:r=>`<td style="color:var(--txb);font-weight:500">${r.full_name||r.roster_id}</td><td>${tc(r.team_abbr)}</td>
        <td class="tc mono">${r.week}</td><td class="tc mono">${r.rush_att}</td>
        <td class="tc mono" style="color:var(--txb);font-weight:600">${r.rush_yds}</td>
        <td class="tc mono" style="color:var(--grn)">${r.rush_tds}</td>
        <td class="tc mono" style="color:var(--red)">${r.rush_fumbles}</td>
        <td class="tc mono">${r.rush_longest}</td>`},
    receiving:{h:['Player','Team','Wk','Rec','Yds','TD','Drops','Lng'],
      f:r=>`<td style="color:var(--txb);font-weight:500">${r.full_name||r.roster_id}</td><td>${tc(r.team_abbr)}</td>
        <td class="tc mono">${r.week}</td><td class="tc mono">${r.rec_catches}</td>
        <td class="tc mono" style="color:var(--txb);font-weight:600">${r.rec_yds}</td>
        <td class="tc mono" style="color:var(--grn)">${r.rec_tds}</td>
        <td class="tc mono" style="color:var(--red)">${r.rec_drops}</td>
        <td class="tc mono">${r.rec_longest}</td>`},
    defense:{h:['Player','Team','Wk','Tkl','Sacks','INT','FF','FR','PD'],
      f:r=>`<td style="color:var(--txb);font-weight:500">${r.full_name||r.roster_id}</td><td>${tc(r.team_abbr)}</td>
        <td class="tc mono">${r.week}</td>
        <td class="tc mono" style="color:var(--txb);font-weight:600">${r.def_tackles}</td>
        <td class="tc mono">${r.def_sacks}</td>
        <td class="tc mono" style="color:var(--grn)">${r.def_ints}</td>
        <td class="tc mono">${r.def_forced_fumbles}</td><td class="tc mono">${r.def_fumble_rec}</td>
        <td class="tc mono">${r.def_passes_deflected}</td>`},
  };
  const c=cols[type];if(!c)return;

  const label=type.charAt(0).toUpperCase()+type.slice(1);
  let h=`<div class="sb"><h2>${label}</h2></div>`;
  h+=`<div class="card"><div style="overflow-x:auto"><table>
    <thead><tr>${c.h.map(x=>`<th${x!=='Player'&&x!=='Team'?' class="tc"':''}>${x}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>${c.f(r)}</tr>`;});
  h+=`</tbody></table></div></div>`;
  el.innerHTML=h;
}

// === NO STATS EMPTY STATE ===
async function loadRosterStats(type,el){
  const cfg={
    passing:{label:'Passing',cols:['Player','Team','Wk','Att','Cmp','Yds','TD','INT','Rating']},
    rushing:{label:'Rushing',cols:['Player','Team','Wk','Att','Yds','TD','Fum','Lng']},
    receiving:{label:'Receiving',cols:['Player','Team','Wk','Rec','Yds','TD','Drops','Lng']},
    defense:{label:'Defense',cols:['Player','Team','Wk','Tkl','Sacks','INT','FF','FR','PD']},
  };
  const c=cfg[type]||{label:type,cols:['Player','Team','Yds','TD']};
  const label=c.label;
  let h=`<div class="sb"><h2>${label}</h2></div>`;
  h+=`<div class="card"><div class="ch"><h3>${label} Leaders</h3></div>
    <div style="overflow-x:auto"><table>
    <thead><tr>${c.cols.map(x=>`<th${x!=='Player'&&x!=='Team'?' class="tc"':''}>${x}</th>`).join('')}</tr></thead>
    <tbody><tr><td colspan="${c.cols.length}" style="padding:40px 24px;text-align:center">
      <div style="font-size:13px;font-weight:500;color:var(--txd);margin-bottom:6px">No stats exported yet</div>
      <div style="font-size:11px;color:var(--txd);opacity:.55">In the Companion App → Stats → export Player Stats for this week</div>
    </td></tr></tbody></table></div></div>`;
  el.innerHTML=h;
}

// === TEAM STATS ===
async function loadTeamStats(){
  const rows=await api('/api/team-stats');
  const el=document.getElementById('t-teamstats');
  if(!rows.length){el.innerHTML=`<div class="card"><div class="empty"><h4>No team stats</h4><p>Export team stats from the Companion App</p></div></div>`;return;}
  let h=`<div class="sb"><h2>Team Stats</h2></div>`;

  const off=[...rows].sort((a,b)=>b.off_total_yds-a.off_total_yds);
  h+=`<div class="card"><div class="ch"><h3>Offense</h3><span class="badge">${off.length} teams</span><span style="font-size:10px;color:var(--txd);font-family:'JetBrains Mono';letter-spacing:.05em">per game</span></div><div style="overflow-x:auto"><table>
    <thead><tr><th>Team</th><th class="tc">TOT YDS/G</th><th class="tc">PASS YDS/G</th><th class="tc">RUSH YDS/G</th><th class="tc">TO DIFF</th></tr></thead><tbody>`;
  off.forEach((r,i)=>{
    const td=r.turnover_diff||0;
    h+=`<tr ${i===0?'style="background:rgba(255,255,255,.015)"':''}><td>${tc(r.team_abbr)}</td>
      <td class="tc mono" style="color:var(--txb);font-weight:600">${r.off_total_yds||0}</td>
      <td class="tc mono">${r.off_pass_yds||0}</td>
      <td class="tc mono">${r.off_rush_yds||0}</td>
      <td class="tc ${td>0?'dp':td<0?'dn':'dz'} mono">${td>0?'+':''}${td}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;

  const def=[...rows].sort((a,b)=>a.def_total_yds-b.def_total_yds);
  h+=`<div class="card"><div class="ch"><h3>Defense</h3><span class="badge">${def.length} teams</span><span style="font-size:10px;color:var(--txd);font-family:'JetBrains Mono';letter-spacing:.05em">per game</span></div><div style="overflow-x:auto"><table>
    <thead><tr><th>Team</th><th class="tc">TOT YDS/G</th><th class="tc">PASS YDS/G</th><th class="tc">RUSH YDS/G</th></tr></thead><tbody>`;
  def.forEach((r,i)=>{
    h+=`<tr ${i===0?'style="background:rgba(255,255,255,.015)"':''}><td>${tc(r.team_abbr)}</td>
      <td class="tc mono" style="color:var(--txb);font-weight:600">${r.def_total_yds||0}</td>
      <td class="tc mono">${r.def_pass_yds||0}</td>
      <td class="tc mono">${r.def_rush_yds||0}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  el.innerHTML=h;
}

// === SETUP ===
function loadSetup(){
  const el=document.getElementById('t-setup');
  const host=window.location.origin;
  el.innerHTML=`
    <div class="sb"><h2>Setup</h2></div>
    <div class="card">
      <div class="ch"><h3>Export URL</h3></div>
      <div style="padding:16px">
        <div style="background:var(--bg);border:1px solid var(--bdr2);border-radius:4px;padding:12px 16px;
          font-family:'JetBrains Mono';font-size:13px;color:var(--accent2);word-break:break-all;
          cursor:pointer" onclick="navigator.clipboard.writeText('${host}');notify('Copied','ok')" title="Click to copy">
          ${host}
        </div>
        <div style="font-size:11px;color:var(--txd);margin-top:7px">Click to copy · paste into Madden Companion App</div>
      </div>
    </div>
    <div class="card">
      <div class="ch"><h3>How to Export</h3></div>
      <div class="info-box">
        <h4>Step 1 — Open the Companion App</h4>
        <ol>
          <li>Download the <span class="hl">Madden NFL 26 Companion App</span></li>
          <li>Log in with your EA account and go to <span class="hl">Franchises</span></li>
        </ol>
        <h4>Step 2 — Export Data</h4>
        <ol>
          <li>Tap <span class="hl">Export</span> → paste your URL above</li>
          <li>Check: League Info, Rosters, Weekly Stats</li>
          <li>Select your week and tap <span class="hl">Export</span></li>
        </ol>
        <h4>Step 3 — Done</h4>
        <ol>
          <li>Dashboard auto-refreshes every 30 seconds</li>
          <li>Share this URL with your league</li>
        </ol>
      </div>
    </div>
    <div class="card">
      <div class="ch"><h3>Export Log</h3></div>
      <div id="exportLog" style="padding:14px"><div class="empty"><p>Loading...</p></div></div>
    </div>
    <div class="card" style="border-color:rgba(239,68,68,.1)">
      <div class="ch" style="background:rgba(239,68,68,.03)"><h3 style="color:var(--red)">Danger Zone</h3></div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;flex-wrap:wrap;gap:10px">
        <span style="font-size:12px;color:var(--txd)">Delete all imported data and start fresh</span>
        <button style="padding:7px 16px;border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.06);
          color:var(--red);border-radius:4px;cursor:pointer;font-family:'Inter';font-weight:500;
          font-size:12px" onclick="resetAll()">Reset all data</button>
      </div>
    </div>`;
  loadExportLog();
}

async function loadExportLog(){
  const rows=await api('/api/exports');
  const el=document.getElementById('exportLog');
  if(!el)return;
  if(!rows.length){el.innerHTML=`<div class="empty"><h4>No exports yet</h4><p>Waiting for Companion App...</p></div>`;return;}
  let h=`<table class="elog"><thead><tr><th>Type</th><th class="tc">Records</th><th>Time</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    const d=new Date(r.exported_at+'Z');
    h+=`<tr><td><span class="etype">${r.export_type}</span></td><td class="tc">${r.record_count}</td>
      <td>${d.toLocaleString()}</td></tr>`;
  });
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

async function resetAll(){
  if(!confirm('Delete ALL league data? This cannot be undone.'))return;
  await fetch('/api/reset',{method:'DELETE'});
  notify('All data cleared','ok');
  load(curTab);loadSummary();
}

function notify(msg,type){
  const el=document.getElementById('notif');
  el.className=`notif ${type}`;el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

// === INIT ===
loadSummary();
load('standings');
setInterval(()=>{loadSummary();load(curTab);},30000);
</script>
